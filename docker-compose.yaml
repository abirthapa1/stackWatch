# Docker compose file

version: '3.8'

services:
  ### SPRING BOOT APPLICATION ###
  app:
    build: .
    container_name: springboot-app
    ports:
      - "8080:8080"
    
    env_file:
      - ./config/app.env

    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - app-network
    restart: on-failure

  ### MARIADB DATABASE ###
  db:
    image: mariadb:latest
    container_name: mariadb
    ports:
     - "3307:3306"
    
    env_file:
      - ./config/db.env
    
    ### MAKING OUR DB DATA PERSISTENT
    volumes:
      - db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - app-network
  
  ### CADVISOR ###
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    
    ### Binding our system data to the cadvisor container
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"

    networks:
      - app-network

  ### MYSQLD EXPORTER ###
  ### GIVES US THE METRICS OF OUR DATABASE ###
  mariadb-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mariadb-exporter
    ports:
      - "9104:9104"
    command:
      - "--mysqld.address=db:3306"
      - "--mysqld.username=${MARIADB_USER}"
    
    env_file:
      - ./config/db.env
      
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  ### PROMETHEUS ###
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    
    ### Binding the yml file to the container
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
      - cadvisor
      - mariadb-exporter
    
    networks:
      - app-network

  ### GRAFANA ###
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    
    env_file:
      - ./config/grafana.env

    ### PERSISTING OUR GRAFANA DATA
    volumes:
      - grafana-data:/var/lib/grafana

    depends_on:
      - prometheus
    
    networks:
      - app-network

volumes:
  db-data:
  grafana-data:

networks:
  app-network:
    driver: bridge
